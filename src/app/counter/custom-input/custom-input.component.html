<div class="app-custom-value">
    <div class="toggle-btn-container">
        <div class="toggle-btn" 
            (click)="onToggleCustInput()" *ngIf="!showCustomInput">+</div>
        <div class="toggle-btn" 
            (click)="onToggleCustInput()" *ngIf="showCustomInput">-</div>
    </div>

    <div class="custom-input-container" *ngIf="showCustomInput">
        <input type="text" [(ngModel)]="customValue">
        <button class="btn-increment-by"
        (click)="onCustomValueBtnClicked()">Increment By</button>
    </div>
</div>
